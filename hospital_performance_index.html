        .metrics-table {

            margin-bottom: 30px;

        }
        .metrics-table h3 {

        table {

        }
        
        .footer {

        @media (max-width: 768px) {

<body>

        <!-- 关键指标汇总 -->

            <div class="chart-card full-width">

        <!-- 详细指标表格 -->

                    <tr>

    <script>
        // 全局配置
        Chart.defaults.color = '#a0a0c0';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.1)';

        // 指标数据
        const metricsData = [
            // 业务类指标
            { category: '业务类', code: '1.1', name: '门急诊均次费用', unit: '元', desc: '反应门急诊患者平均支付费用', formula: '门诊收入/门急诊人次数' },
            { category: '业务类', code: '1.2', name: '复诊率', unit: '次', desc: '反应门急诊患者复诊情况', formula: '门急诊人次数/门急诊人数' },
            { category: '业务类', code: '1.3', name: '床日费', unit: '元', desc: '反应每床日患者平均支付费用', formula: '住院收入/实际占用床日数' },
            { category: '业务类', code: '1.4', name: '床位周转次数', unit: '次', desc: '反应每床位周转病人次数', formula: '出院人数/平均开放床位数' },
            { category: '业务类', code: '1.5', name: '床位使用率', unit: '%', desc: '反应每床位使用效率', formula: '实际占用总床日数/实际开放总床日数*100%' },
            { category: '业务类', code: '1.6', name: '平均住院天数', unit: '天', desc: '反应出院患者平均住院天数', formula: '出院者占用床日数/出院人数' },
            { category: '业务类', code: '1.7', name: '医疗收入增长率', unit: '%', desc: '反应医疗收入增长情况', formula: '（当期医疗收入/同期医疗收入 -1）*100%' },
            { category: '业务类', code: '1.8', name: '医疗服务收入占比', unit: '%', desc: '反应医务性收入在医疗收入中的占比情况', formula: '医务性收入/医疗收入×100%' },
            { category: '业务类', code: '1.9', name: '检查化验收入占比', unit: '%', desc: '反应检查化验收入在医疗收入中的占比情况', formula: '检查化验收入/医疗收入×100%' },
            { category: '业务类', code: '1.10', name: '卫生材料收入占比', unit: '%', desc: '反应卫生材料收入在医疗收入中的占比情况', formula: '卫生材料收入/医疗收入×100%' },
            { category: '业务类', code: '1.11', name: '药品收入占比（剔除中药饮片）', unit: '%', desc: '反应药品收入（剔除中药饮片收入）在医疗收入中的占比情况', formula: '药品收入（剔除中药饮片收入）/医疗收入×100%' },
            { category: '业务类', code: '1.12', name: '中药饮片收入占比', unit: '%', desc: '反应中药饮片收入在医疗收入中的占比情况', formula: '中药饮片收入/医疗收入×100%' },
            // 成本类指标
            { category: '成本类', code: '2.1', name: '总支出增长率', unit: '%', desc: '反应总支出增长情况', formula: '（当期总支出/同期总支出 -1）*100%' },
            { category: '成本类', code: '2.2', name: '医疗支出率', unit: '%', desc: '反应医疗收入可以负担医疗基本成本的情况', formula: '医疗支出（剔除项目、公卫、科教）/医疗收入×100%' },
            { category: '成本类', code: '2.3', name: '万元医疗收入能耗支出', unit: '元', desc: '反应万元医疗收入中能耗占比情况', formula: '能耗支出/医疗收入*10000' },
            { category: '成本类', code: '2.4', name: '百元医疗收入卫生耗材占比', unit: '%', desc: '反应百元医疗收入（不含药品收入）中卫生材料占比情况', formula: '消耗卫生材料费用（剔除项目、科教）/医疗收入*100' },
            { category: '成本类', code: '2.5', name: '管理费用占业务活动及管理费用比例', unit: '%', desc: '反应管理费用占业务活动及管理费用比例情况', formula: '管理费用/（业务活动费用 + 管理费用）*100%' },
            { category: '成本类', code: '2.6', name: '人员支出占总支出比例', unit: '%', desc: '反应人员支出占总支出比例情况', formula: '人员支出/总支出' },
            // 效率类指标
            { category: '效率类', code: '3.1', name: '人均服务居民数', unit: '人', desc: '反应每位职工服务的辖区居民数量', formula: '辖区居民人数/在岗职工人数' },
            { category: '效率类', code: '3.2', name: '人均门急诊人次', unit: '人次', desc: '反应每位门诊职工承担的门急诊人次', formula: '门急诊人次/门诊在岗职工人数' },
            { category: '效率类', code: '3.3', name: '人均床日数', unit: '天', desc: '反应每职工承担的床日天数', formula: '实际占用总床日数/在岗职工人数' },
            { category: '效率类', code: '3.4', name: '每床位占用医疗设备', unit: '元', desc: '反应每床位占用的医疗设备情况', formula: '医疗设备原值/实际开放床位数' },
            { category: '效率类', code: '3.5', name: '百元医疗设备医疗收入', unit: '元', desc: '反应医疗设备创收能力', formula: '（医疗收入 - 药品收入）/[（年初医疗设备原值 + 当期医疗设备原值）/2]*100' },
            { category: '效率类', code: '3.6', name: '人均医疗收入', unit: '元', desc: '反应每位职工能创造的医疗收入', formula: '医疗收入/在岗职工人数' },
            { category: '效率类', code: '3.7', name: '人均人员支出', unit: '元', desc: '反应每位职工平均人员支出', formula: '人员支出/在岗职工人数' },
            { category: '效率类', code: '3.8', name: '应收账款周转天数', unit: '天', desc: '反应应收账款周转情况', formula: '[（年初应收账款 + 当期应收账款）/2*365]/医疗收入' },
            { category: '效率类', code: '3.9', name: '存货周转天数', unit: '天', desc: '反应存货周转情况', formula: '[（年初存货 + 当期存货）/2*365]/医疗支出' },
            // 发展类指标
            { category: '发展类', code: '4.1', name: '净资产增长率', unit: '%', desc: '反应医院净资产增长情况', formula: '（当期净资产/年初净资产 -1）*100%' },
            { category: '发展类', code: '4.2', name: '固定资产增长率', unit: '%', desc: '反应医院固定资产增长情况', formula: '（当期固定资产原值/年初固定资产原值 -1）*100%' },
            { category: '发展类', code: '4.3', name: '每职工承担科研项目数', unit: '项', desc: '反应科研项目开展情况', formula: '科研项目数/在岗职工人数' },
        ];

        // 分类统计
        const categoryStats = {
            '业务类': 12,
            '成本类': 6,
            '效率类': 9,
            '发展类': 3
        };

        // 单位统计
        const unitStats = {
            '%': 14,
            '元': 8,
            '次': 3,
            '天': 4,
            '人次': 2,
            '项': 1
        };

        // 1. 指标分类分布 - 饼图
        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        new Chart(categoryCtx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(categoryStats),
                datasets: [{
                    data: Object.values(categoryStats),
                    backgroundColor: [
                        'rgba(0, 212, 255, 0.8)',
                        'rgba(247, 37, 133, 0.8)',
                        'rgba(0, 255, 136, 0.8)',
                        'rgba(123, 44, 191, 0.8)'
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#a0a0c0',
                            padding: 15
                        }
                    }
                }
            }
        });

        // 2. 指标层级结构 - 树状图模拟
        const hierarchyCtx = document.getElementById('hierarchyChart').getContext('2d');
        new Chart(hierarchyCtx, {
            type: 'bar',
            data: {
                labels: ['一级指标', '二级指标'],
                datasets: [{
                    label: '指标数量',
                    data: [4, 30],
                    backgroundColor: [
                        'rgba(0, 212, 255, 0.8)',
                        'rgba(123, 44, 191, 0.8)'
                    ],
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });

        // 3. 单位类型分布 - 极坐标图
        const unitCtx = document.getElementById('unitChart').getContext('2d');
        new Chart(unitCtx, {
            type: 'polarArea',
            data: {
                labels: Object.keys(unitStats),
                datasets: [{
                    data: Object.values(unitStats),
                    backgroundColor: [
                        'rgba(0, 212, 255, 0.7)',
                        'rgba(247, 37, 133, 0.7)',
                        'rgba(0, 255, 136, 0.7)',
                        'rgba(255, 209, 102, 0.7)',
                        'rgba(123, 44, 191, 0.7)',
                        'rgba(255, 107, 107, 0.7)'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        ticks: {
                            backdropColor: 'transparent',
                            color: '#a0a0c0'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#a0a0c0'
                        }
                    }
                }
            }
        });

        // 4. 核心 KPI 指标 - 横向柱状图
        const kpiCtx = document.getElementById('kpiChart').getContext('2d');
        const topKPIs = [
            '门急诊均次费用', '床位使用率', '平均住院天数', 
            '医疗收入增长率', '人员支出占总支出比例', '净资产增长率'
        ];
        new Chart(kpiCtx, {
            type: 'bar',
            data: {
                labels: topKPIs,
                datasets: [{
                    label: '重要性评分',
                    data: [95, 92, 90, 88, 85, 82],
                    backgroundColor: 'rgba(0, 212, 255, 0.8)',
                    borderRadius: 4
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 100,
                        grid: {
                            color: 'rgba(255, 255, 255, 0.05)'
                        }
                    },
                    y: {
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });

        // 5. 指标体系覆盖度 - 雷达图
        const radarCtx = document.getElementById('radarChart').getContext('2d');
        new Chart(radarCtx, {
            type: 'radar',
            data: {
                labels: ['业务能力', '成本控制', '运营效率', '发展潜力', '财务健康', '服务质量'],
                datasets: [{
                    label: '指标覆盖度',
                    data: [85, 78, 82, 65, 75, 80],
                    backgroundColor: 'rgba(0, 212, 255, 0.2)',
                    borderColor: '#00d4ff',
                    pointBackgroundColor: '#00d4ff',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: '#00d4ff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 100,
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        },
                        angleLines: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        },
                        pointLabels: {
                            color: '#a0a0c0',
                            font: {
                                size: 12
                            }
                        }
                    }
                }
            }
        });

        // 填充表格
        function renderTable() {
            const tbody = document.getElementById('metricsTableBody');
            let html = '';
            
            metricsData.forEach((item, index) => {
                const badgeClass = {
                    '业务类': 'cat-business',
                    '成本类': 'cat-cost',
                    '效率类': 'cat-efficiency',
                    '发展类': 'cat-development'
                }[item.category];
                
                html += `
                    <tr>
                        <td><span class="category-badge ${badgeClass}">${item.category}</span></td>
                        <td>${item.code}</td>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.unit}</td>
                        <td>${item.desc}</td>
                        <td><code style="color: #00d4ff; font-size: 0.85em;">${item.formula}</code></td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        renderTable();
    </script>
</body>
</html>
