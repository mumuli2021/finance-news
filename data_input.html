<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础数据输入 | 医院绩效指标平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 40px 30px;
            margin-bottom: 35px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(123, 44, 191, 0.05));
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .header .subtitle { font-size: 1.2em; color: #f5f5f5; margin-bottom: 15px; }
        .header .meta { font-size: 0.9em; color: #e8e8e8; }
        
        .action-buttons {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.4);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .action-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 212, 255, 0.1));
            border-color: #00d4ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        .action-btn.primary {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 255, 136, 0.05));
            border-color: rgba(0, 255, 136, 0.4);
        }
        .action-btn.primary:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.25), rgba(0, 255, 136, 0.1));
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        
        .data-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .data-section h2 {
            color: #00d4ff;
            font-size: 1.5em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .data-section h2::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 25px;
            background: linear-gradient(180deg, #00d4ff, #00ff88);
            border-radius: 3px;
        }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .input-group {
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 18px;
        }
        .input-group label {
            display: block;
            color: #fff;
            margin-bottom: 10px;
            font-size: 0.95em;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px;
            background: rgba(0,212,255,0.1);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0,212,255,0.15);
            box-shadow: 0 0 15px rgba(0,212,255,0.2);
        }
        .input-group .hint {
            color: #a0a0c0;
            font-size: 0.8em;
            margin-top: 6px;
        }
        
        .calculate-section {
            background: linear-gradient(135deg, rgba(0,255,136,0.05), rgba(0,212,255,0.05));
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .calculate-btn {
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,212,255,0.2));
            border: 2px solid rgba(0,255,136,0.5);
            color: #fff;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .calculate-btn:hover {
            background: linear-gradient(135deg, rgba(0,255,136,0.3), rgba(0,212,255,0.3));
            border-color: #00ff88;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        
        .status-bar {
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 20px;
            color: #00ff88;
            font-size: 0.9em;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: #8080a0;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        .footer a { color: #00d4ff; text-decoration: none; }
        
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(123,44,191,0.1));
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .stat-card .label {
            color: #a0a0c0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 基础数据输入</h1>
            <div class="subtitle">医院绩效指标计算基础数据（58 项）</div>
            <div class="meta">数据来源：医院采集系统｜开发者：小五｜版本：V1.1.0</div>
            <div class="action-buttons">
                <a href="hospital_performance_index_v3.html" class="action-btn">← 返回指标平台</a>
                <button class="action-btn primary" onclick="calculate()">🔄 重新计算</button>
                <button class="action-btn" onclick="saveData()">💾 保存数据</button>
                <button class="action-btn" onclick="clearData()">🗑️ 清空数据</button>
            </div>
        </div>

        <div class="stats-summary">
            <div class="stat-card">
                <div class="value" id="totalFields">58</div>
                <div class="label">数据项总数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="filledFields">0</div>
                <div class="label">已填写</div>
            </div>
            <div class="stat-card">
                <div class="value" id="fillRate">0%</div>
                <div class="label">填写率</div>
            </div>
        </div>

        <div class="data-section">
            <h2>👨‍⚕️ 门急诊数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>门急诊人次</label><input type="number" id="门急诊人次" value="0"></div>
                <div class="input-group"><label>门急诊人次数</label><input type="number" id="门急诊人次数" value="0"></div>
                <div class="input-group"><label>门急诊人数</label><input type="number" id="门急诊人数" value="0"></div>
                <div class="input-group"><label>门诊收入（元）</label><input type="number" id="门诊收入" value="0"></div>
                <div class="input-group"><label>门诊在岗职工人数</label><input type="number" id="门诊在岗职工人数" value="0"></div>
                <div class="input-group"><label>门急诊在岗职工人数</label><input type="number" id="门急诊在岗职工人数" value="0"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>🛏️ 住院数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>出院人数</label><input type="number" id="出院人数" value="0"></div>
                <div class="input-group"><label>出院者占用床日数</label><input type="number" id="出院者占用床日数" value="0"></div>
                <div class="input-group"><label>住院收入（元）</label><input type="number" id="住院收入" value="0"></div>
                <div class="input-group"><label>住院在岗职工人数</label><input type="number" id="住院在岗职工人数" value="0"></div>
                <div class="input-group"><label>平均开放床位数</label><input type="number" id="平均开放床位数" value="0"></div>
                <div class="input-group"><label>期末实际开放床位数</label><input type="number" id="期末实际开放床位数" value="0"></div>
                <div class="input-group"><label>实际占用床日数</label><input type="number" id="实际占用床日数" value="0"></div>
                <div class="input-group"><label>实际占用总床日数</label><input type="number" id="实际占用总床日数" value="0"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>💰 收入数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>医疗收入（元）</label><input type="number" id="医疗收入" value="0"></div>
                <div class="input-group"><label>医疗收入不含药品收入（元）</label><input type="number" id="医疗收入不含药品收入" value="0"></div>
                <div class="input-group"><label>医务性收入（元）</label><input type="number" id="医务性收入" value="0"></div>
                <div class="input-group"><label>检查化验收入（元）</label><input type="number" id="检查化验收入" value="0"></div>
                <div class="input-group"><label>药品收入（元）</label><input type="number" id="药品收入" value="0"></div>
                <div class="input-group"><label>药品收入剔除中药饮片收入（元）</label><input type="number" id="药品收入剔除中药饮片收入" value="0"></div>
                <div class="input-group"><label>中药饮片收入（元）</label><input type="number" id="中药饮片收入" value="0"></div>
                <div class="input-group"><label>当期医疗收入（元）</label><input type="number" id="当期医疗收入" value="0"></div>
                <div class="input-group"><label>当期总收入（元）</label><input type="number" id="当期总收入" value="0"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>💸 支出数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>总支出（元）</label><input type="number" id="总支出" value="0"></div>
                <div class="input-group"><label>当期总支出（元）</label><input type="number" id="当期总支出" value="0"></div>
                <div class="input-group"><label>当期药品支出（元）</label><input type="number" id="当期药品支出" value="0"></div>
                <div class="input-group"><label>人员支出（元）</label><input type="number" id="人员支出" value="0"></div>
                <div class="input-group"><label>管理费用（元）</label><input type="number" id="管理费用" value="0"></div>
                <div class="input-group"><label>能耗支出（元）</label><input type="number" id="能耗支出" value="0"></div>
                <div class="input-group"><label>医疗支出剔除项目公卫科教（元）</label><input type="number" id="医疗支出剔除项目公卫科教" value="0"></div>
                <div class="input-group"><label>消耗卫生材料费用剔除项目科教（元）</label><input type="number" id="消耗卫生材料费用剔除项目科教" value="0"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>🏥 资产财务数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>当期净产资（元）</label><input type="number" id="当期净产资" value="0"></div>
                <div class="input-group"><label>负债总额（元）</label><input type="number" id="负债总额" value="0"></div>
                <div class="input-group"><label>基本收支结余（元）</label><input type="number" id="基本收支结余" value="0"></div>
                <div class="input-group"><label>当期医疗设备净值（元）</label><input type="number" id="当期医疗设备净值" value="0"></div>
                <div class="input-group"><label>当期医疗设备原值（元）</label><input type="number" id="当期医疗设备原值" value="0"></div>
                <div class="input-group"><label>年初医疗设备原值（元）</label><input type="number" id="年初医疗设备原值" value="0"></div>
                <div class="input-group"><label>年初应收账款（元）</label><input type="number" id="年初应收账款" value="0"></div>
                <div class="input-group"><label>当期应收账款（元）</label><input type="number" id="当期应收账款" value="0"></div>
                <div class="input-group"><label>年初应付药品款（元）</label><input type="number" id="年初应付药品款" value="0"></div>
                <div class="input-group"><label>当期应付药品款（元）</label><input type="number" id="当期应付药品款" value="0"></div>
                <div class="input-group"><label>年初存货（元）</label><input type="number" id="年初存货" value="0"></div>
                <div class="input-group"><label>当期存货（元）</label><input type="number" id="当期存货" value="0"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>👥 人员与辖区数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>在岗职工人数</label><input type="number" id="在岗职工人数" value="0"></div>
                <div class="input-group"><label>辖区居民人数</label><input type="number" id="辖区居民人数" value="0"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>🔬 科研与项目数据</h2>
            <div class="input-grid">
                <div class="input-group"><label>当期科研项目数</label><input type="number" id="当期科研项目数" value="0"></div>
                <div class="input-group"><label>当期新诊疗项目</label><input type="number" id="当期新诊疗项目" value="0"></div>
            </div>
        </div>

        <div class="calculate-section">
            <button class="calculate-btn" onclick="calculate()">
                🔄 重新计算指标
            </button>
            <div class="status-bar" id="statusBar">
                💾 数据已加载 | 最后更新：--
            </div>
        </div>

        <div class="footer">
            <p><strong>小五 · 首席数据官</strong> | 2026-03-18</p>
            <p style="margin-top: 10px;">
                <a href="hospital_performance_index_v3.html">← 返回指标平台</a>
            </p>
        </div>
    </div>

    <script>
        const DB_KEY = 'hospital_base_data_v2';
        const allFields = [
            '门急诊人次', '门急诊人次数', '门急诊人数', '门诊收入', '门诊在岗职工人数', '门急诊在岗职工人数',
            '出院人数', '出院者占用床日数', '住院收入', '住院在岗职工人数', '平均开放床位数', '期末实际开放床位数', '实际占用床日数', '实际占用总床日数',
            '医疗收入', '医疗收入不含药品收入', '医务性收入', '检查化验收入', '药品收入', '药品收入剔除中药饮片收入', '中药饮片收入', '当期医疗收入', '当期总收入',
            '总支出', '当期总支出', '当期药品支出', '人员支出', '管理费用', '能耗支出', '医疗支出剔除项目公卫科教', '消耗卫生材料费用剔除项目科教',
            '当期净产资', '负债总额', '基本收支结余', '当期医疗设备净值', '当期医疗设备原值', '年初医疗设备原值', '年初应收账款', '当期应收账款', '年初应付药品款', '当期应付药品款', '年初存货', '当期存货',
            '在岗职工人数', '辖区居民人数',
            '当期科研项目数', '当期新诊疗项目'
        ];

        let baseData = {};

        // 加载数据
        function loadData() {
            try {
                const saved = localStorage.getItem(DB_KEY);
                if (saved) {
                    baseData = JSON.parse(saved);
                    allFields.forEach(field => {
                        const input = document.getElementById(field);
                        if (input && baseData[field] !== undefined) {
                            input.value = baseData[field];
                        }
                    });
                    if (baseData.lastUpdate) {
                        document.getElementById('statusBar').innerHTML = '💾 已加载本地数据 | 最后更新：' + new Date(baseData.lastUpdate).toLocaleString('zh-CN');
                    }
                    updateStats();
                }
            } catch (e) {
                console.error('加载数据失败:', e);
            }
        }

        // 保存数据
        function saveData() {
            baseData = {};
            allFields.forEach(field => {
                const input = document.getElementById(field);
                if (input) {
                    baseData[field] = parseFloat(input.value) || 0;
                }
            });
            baseData.lastUpdate = new Date().toISOString();
            
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(baseData));
                document.getElementById('statusBar').innerHTML = '✅ 数据已保存 | 最后更新：' + new Date().toLocaleString('zh-CN');
                updateStats();
                alert('✅ 数据已保存到本地数据库！\n\n下次打开页面会自动加载。');
            } catch (e) {
                alert('❌ 保存失败：' + e.message);
            }
        }

        // 清空数据
        function clearData() {
            if (confirm('确定要清空所有数据吗？')) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        }

        // 更新统计
        function updateStats() {
            let filled = 0;
            allFields.forEach(field => {
                const input = document.getElementById(field);
                if (input && parseFloat(input.value) > 0) {
                    filled++;
                }
            });
            document.getElementById('filledFields').textContent = filled;
            document.getElementById('fillRate').textContent = ((filled / allFields.length) * 100).toFixed(1) + '%';
        }

        // 自动计算
        function autoCalculate() {
            updateStats();
        }

        // 计算指标
        function calculate() {
            const getVal = (id) => parseFloat(document.getElementById(id)?.value) || 0;
            
            // 计算核心指标
            const outpatientIncome = getVal('门诊收入');
            const outpatientVisits = getVal('门急诊人次');
            const inpatientIncome = getVal('住院收入');
            const bedDays = getVal('实际占用床日数');
            const openBeds = getVal('平均开放床位数');
            const discharges = getVal('出院人数');
            const totalIncome = getVal('医疗收入');
            const totalStaff = getVal('在岗职工人数');
            
            const results = {
                avgOutpatientFee: outpatientVisits > 0 ? (outpatientIncome / outpatientVisits) : 0,
                bedDayFee: bedDays > 0 ? (inpatientIncome / bedDays) : 0,
                bedTurnover: openBeds > 0 ? (discharges / openBeds) : 0,
                bedUsage: openBeds > 0 && bedDays > 0 ? ((bedDays / (openBeds * 30)) * 100) : 0,
                avgStay: discharges > 0 ? (bedDays / discharges) : 0,
                incomePerStaff: totalStaff > 0 ? (totalIncome / totalStaff) : 0
            };

            saveData();
            
            alert('✅ 计算完成！\n\n📊 核心指标：\n• 门急诊均次费用：' + results.avgOutpatientFee.toFixed(2) + '元\n• 床日费：' + results.bedDayFee.toFixed(2) + '元/天\n• 床位周转次数：' + results.bedTurnover.toFixed(2) + '次\n• 床位使用率：' + results.bedUsage.toFixed(2) + '%\n• 平均住院天数：' + results.avgStay.toFixed(2) + '天\n• 人均医疗收入：' + results.incomePerStaff.toFixed(2) + '元\n\n💡 数据已自动保存！');
        }

        // 初始化
        loadData();
        
        // 监听所有输入框
        allFields.forEach(field => {
            const input = document.getElementById(field);
            if (input) {
                input.addEventListener('input', autoCalculate);
            }
        });
    </script>
</body>
</html>
